	group = 'convertigo'
}

task checkLicenseDate {
	group = 'convertigo'
	
	def licenseTextFile = file('license.txt')
	
	inputs.properties(
		'currentYear': currentYear
	)
	inputs.files licenseTextFile
	outputs.files licenseTextFile
	
	doFirst {
		licenseTextFile.text = licenseTextFile.text.replaceAll('-20\\d\\d-', "-${currentYear}-")
	}
}

tasks.register('checkStudioJdkUpToDate') {
	group = 'convertigo'
	description = 'Checks whether installers/nsis/download-jdk.sh uses the latest Temurin LTS patch release.'

	inputs.file 'installers/nsis/download-jdk.sh'

	doLast {
		def failOnOutdated = project.findProperty('failOnOutdatedStudioJdk')?.toString()?.toBoolean() ?: false
		def script = file('installers/nsis/download-jdk.sh').text
		def releaseMatcher = (script =~ /(?m)^JDK_RELEASE=(.+)$/)
		if (!releaseMatcher.find()) {
			def msg = "Cannot read JDK_RELEASE from installers/nsis/download-jdk.sh"
			if (failOnOutdated) {
				throw new GradleException(msg)
			}
			logger.warn(msg)
			return
		}

		def configuredRelease = releaseMatcher.group(1).trim()
		def majorMatcher = (configuredRelease =~ /^(\d+)/)
		if (!majorMatcher.find()) {
			def msg = "Cannot extract JDK major from JDK_RELEASE=${configuredRelease}"
			if (failOnOutdated) {
				throw new GradleException(msg)
			}
			logger.warn(msg)
			return
		}

		def configuredMajor = majorMatcher.group(1)
		try {
			def ltsInfo = new JsonSlurper().parse(new URL("https://api.adoptium.net/v3/info/available_releases"))
			def latestLts = ltsInfo?.most_recent_lts?.toString()
			if (latestLts && latestLts != configuredMajor) {
				logger.warn("A newer Temurin LTS major is available (${latestLts}); script is pinned to ${configuredMajor}.")
			}

			def assetsUrl = "https://api.adoptium.net/v3/assets/latest/${configuredMajor}/hotspot?image_type=jdk&os=windows&architecture=x64"
			def assets = new JsonSlurper().parse(new URL(assetsUrl))
			if (!(assets instanceof List) || assets.isEmpty()) {
				def msg = "Cannot query latest Temurin release for JDK ${configuredMajor}"
				if (failOnOutdated) {
					throw new GradleException(msg)
				}
				logger.warn(msg)
				return
			}

			def latestReleaseName = assets[0]?.release_name?.toString()
			if (!latestReleaseName?.startsWith('jdk-')) {
				def msg = "Unexpected Adoptium response: release_name=${latestReleaseName}"
				if (failOnOutdated) {
					throw new GradleException(msg)
				}
				logger.warn(msg)
				return
			}

			def latestRelease = latestReleaseName.substring(4)
			if (configuredRelease == latestRelease) {
				logger.lifecycle("Studio JDK is up to date (${configuredRelease}).")
			} else {
				def msg = "Studio JDK is outdated: configured ${configuredRelease}, latest Temurin ${configuredMajor} is ${latestRelease}."
				if (failOnOutdated) {
					throw new GradleException(msg)
				}
				logger.warn(msg)
			}
		} catch (Exception e) {
			def msg = "Failed to check Studio JDK update status: ${e.message}"
			if (failOnOutdated) {
				throw new GradleException(msg, e)
			}
			logger.warn(msg)
		}
	}
}

def extractVersionLine = { String version ->
	def components = ((version ?: '') =~ /\d+/).collect { it.toString() }
	if (components.isEmpty()) {
		return null
	}
	while (components.size() < 3) {
		components.add('0')
	}
	return components.take(3)
}

def shouldRejectDependencyUpdate = { selection, boolean samePatchLineOnly ->
	def version = selection.candidate.version ?: ''
	def lcVersion = version.toLowerCase()
	def module = "${selection.candidate.group}:${selection.candidate.module}"

	// Reject all pre-releases consistently (case-insensitive).
	if (lcVersion.matches('.*(alpha|beta|rc|cr|m[0-9]+|ea|preview|snapshot|-b).*')) {
		return true
	}

	// Keep legacy major lines for risky dependencies.
	switch (module) {
		case 'commons-collections:commons-collections':
			return !version.startsWith('3.')
		case 'net.sf.jt400:jt400':
			return !version.startsWith('11.')
		case 'org.apache.axis2:axis2-saaj':
			return !version.startsWith('1.8.')
		case 'org.apache.xmlbeans:xmlbeans':
			// Internal patched flavor (e.g. 3.1.1-sb-fixed), keep only the exact current version.
			return version != selection.currentVersion
		case 'org.apache.ws.commons.axiom:axiom-api':
		case 'org.apache.ws.commons.axiom:axiom-dom':
		case 'org.apache.ws.commons.axiom:axiom-impl':
			return !version.startsWith('1.')
	}

	// Tomcat is constrained to major 9.x.
	if (selection.candidate.group in ['org.apache.tomcat', 'org.apache.tomcat.embed']) {
		def candidateLine = extractVersionLine(version)
		def candidateMajor = candidateLine == null ? null : new BigInteger(candidateLine[0])
		if (candidateMajor != null && candidateMajor > BigInteger.valueOf(9)) {
			return true
		}
	}

	if (samePatchLineOnly) {
		def currentLine = extractVersionLine(selection.currentVersion)
		def candidateLine = extractVersionLine(version)
		if (currentLine != null && candidateLine != null && currentLine.take(2) != candidateLine.take(2)) {
			return true
		}
	}

	return false
}

def configureDependencyUpdatesReport = { DependencyUpdatesTask task, boolean samePatchLineOnly ->
	if (task.project == rootProject) {
		task.finalizedBy(rootProject.tasks.named("checkStudioJdkUpToDate"))
	}
	task.revision = 'release'
	task.gradleReleaseChannel = 'current'
	task.rejectVersionIf {
		shouldRejectDependencyUpdate(it, samePatchLineOnly)
	}
}

// https://github.com/ben-manes/gradle-versions-plugin
allprojects {
	tasks.named("dependencyUpdates", DependencyUpdatesTask).configure { task ->
		configureDependencyUpdatesReport(task, false)
	}

	tasks.register("dependencyUpdatesPatch", DependencyUpdatesTask) { task ->
		group = "help"
		description = "Displays dependency updates limited to the current patch line."
		configureDependencyUpdatesReport(task, true)
	}
}

wrapper {
	group = 'convertigo'

	gradleVersion = '9.3.1'
}
