display_name=REST operation
short_description=Defines the common behavior of a REST operation associated with a path mapping.
property.outputContent.display_name=Output content
property.outputContent.short_description=Defines the response format exposed by the operation: Json, Xml, Binary, Convertigo Xml (XSL), or automatic selection from the Accept header.
property.terminateSession.display_name=Terminate session
property.terminateSession.short_description=Defines whether the session should be terminated when no other context exists in the session. | \
 <p>If true and there is no named context for this session, the session ending is requested. If false, the session is left unchanged.</p>
